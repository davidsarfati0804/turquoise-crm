## Désactive explicitement Netlify Blobs pour éviter l'erreur MissingBlobsEnvironmentError
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=4096"

# Plugin Next.js Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Désactive les blobs (aucune section [blobs] ou plugin blobs)